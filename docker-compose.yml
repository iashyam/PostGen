services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    restart: unless-stopped
    expose:
      - "8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TOKEN}
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}
